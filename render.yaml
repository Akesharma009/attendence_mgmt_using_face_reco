services:
  - type: web
    name: facetrack-sms
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: facetrack-sms-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"
      - key: FACE_DETECTION_MODEL
        value: hog

databases:
  - name: facetrack-sms-db
    plan: free