{% extends "base.html" %}
{% block page_title %}Courses{% endblock %}
{% block content %}
<div class="grid grid-2">
  <div class="card">
    <div class="card-header"><h3>Add Course</h3></div>
    <form method="POST">
      <div class="form-group"><label>Course Code</label><input type="text" name="code" required placeholder="CS101"></div>
      <div class="form-group"><label>Course Name</label><input type="text" name="name" required placeholder="Intro to Computer Science"></div>
      <div class="form-group"><label>Credits</label><input type="number" name="credits" value="3" min="1" max="10"></div>
      <div class="form-group"><label>Description</label><textarea name="description" rows="2"></textarea></div>
      <button class="btn btn-primary" type="submit">Add Course</button>
    </form>
  </div>
  <div class="card">
    <div class="card-header"><h3>All Courses ({{ courses|length }})</h3></div>
    <div class="table-wrap">
    <table>
      <thead><tr><th>Code</th><th>Name</th><th>Credits</th><th></th></tr></thead>
      <tbody>
        {% for c in courses %}
        <tr>
          <td style="font-weight:700;">{{ c.code }}</td><td>{{ c.name }}</td><td>{{ c.credits }}</td>
          <td><form method="POST" action="{{ url_for('admin.course_delete', course_id=c.id) }}" onsubmit="return confirm('Delete course?');"><button class="btn btn-danger btn-sm" type="submit">Delete</button></form></td>
        </tr>
        {% else %}
        <tr><td colspan="4"><div class="empty-state">No courses yet.</div></td></tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
  </div>
</div>
{% endblock %}
