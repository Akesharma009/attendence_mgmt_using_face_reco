{% extends "base.html" %}
{% block page_title %}Add Teacher{% endblock %}
{% block content %}
<div class="card" style="max-width:600px; margin:0 auto;">
  <div class="card-header"><h3>New Teacher</h3></div>
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input type="text" name="full_name" required></div>
      <div class="form-group"><label>Teacher Code</label><input type="text" name="teacher_code" required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <div class="form-group"><label>Department</label><input type="text" name="department"></div>
    </div>
    <div class="form-group"><label>Phone</label><input type="text" name="phone"></div>
    <button class="btn btn-primary" type="submit">Create Teacher</button>
    <a href="{{ url_for('admin.teachers_list') }}" class="btn btn-ghost">Cancel</a>
  </form>
</div>
{% endblock %}
